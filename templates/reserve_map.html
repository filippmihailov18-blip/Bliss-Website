{% extends "base.html" %}

{% block content %}

<section class="page-hero">
    <div class="container">
        <p class="eyebrow">Reserve</p>
        <h1>Choose your table</h1>
        <p>Click on a table, then select your date and time.</p>
    </div>
</section>

<section class="section">
    <div class="container">

        <div class="floor-plan">

            <div class="floor-label entrance">Entrance</div>
            <div class="floor-label bar">Bar / Counter</div>
            <div class="floor-label kitchen">Kitchen</div>

            {% for table in tables %}
            <a href="{{ url_for('reserve_form', table_id=table.id) }}" class="table table-{{ table.id }}">
                <strong>T{{ table.id }}</strong>
                <span>{{ table.seats }} seats</span>
            </a>
            {% endfor %}

        </div>

    </div>
</section>

{% endblock %}
